<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Contact Support | MARK_Tools</title>
    <meta name="description" content="Contact the developer of MARK_Tools to report a bug, request a new tool, or send general feedback.">
    <link rel="icon" type="image/png" href="favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#0a0a0a', darkCard: '#111111', darkBorder: '#27272a' } } }
        }
    </script>
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else { document.documentElement.classList.remove('dark'); }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.2s, color 0.2s; }
    </style>
</head>
<body class="bg-[#fafafa] dark:bg-darkBg text-slate-800 dark:text-slate-300 min-h-screen flex flex-col selection:bg-slate-200 selection:text-slate-900 dark:selection:bg-slate-800 dark:selection:text-white">

    <nav class="bg-white/80 dark:bg-darkBg/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 dark:border-darkBorder transition-colors">
        <div class="container mx-auto px-4 h-14 flex justify-between items-center max-w-[1200px]">
            <a href="/" class="flex items-center gap-2 group">
                <div class="w-7 h-7 bg-black dark:bg-white rounded-md flex items-center justify-center">
                    <svg class="w-4 h-4 text-white dark:text-black" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5l8 8 8-8v14"/></svg>
                </div>
                <h1 class="text-lg font-bold tracking-tight text-slate-900 dark:text-white">MARK_Tools</h1>
            </a>
            <div class="flex items-center gap-2">
                <a class="text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition px-3 hidden sm:block" href="/">Back to Home</a>
                <div class="w-px h-4 bg-slate-200 dark:bg-darkBorder mx-2"></div>
                <button onclick="toggleTheme()" class="p-2 rounded-md hover:bg-slate-100 dark:hover:bg-darkCard text-slate-500 dark:text-slate-400 transition-colors focus:outline-none">
                    <svg id="moon-icon" class="w-4 h-4 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                    <svg id="sun-icon" class="w-4 h-4 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-16 flex-grow flex justify-center items-center">
        <div class="w-full max-w-xl">
            
            <div class="text-center mb-10">
                <h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-2 tracking-tight">Contact Support</h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm">Help us build the perfect utility suite. We read every message.</p>
            </div>

            <div class="bg-white dark:bg-darkCard p-6 md:p-8 rounded-2xl border border-slate-200 dark:border-darkBorder shadow-sm">
                <form action="https://formspree.io/f/mkoklbel" method="POST" class="space-y-5">
                    
                    <div class="grid md:grid-cols-2 gap-5">
                        <div class="flex flex-col gap-1.5">
                            <label class="text-xs font-semibold text-slate-700 dark:text-slate-300">Name</label>
                            <input type="text" name="name" required class="w-full p-3 rounded-lg bg-slate-50 dark:bg-[#0a0a0a] border border-slate-200 dark:border-darkBorder text-slate-900 dark:text-white focus:border-slate-500 dark:focus:border-slate-400 outline-none transition-colors text-sm" placeholder="John Doe">
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <label class="text-xs font-semibold text-slate-700 dark:text-slate-300">Email Address</label>
                            <input type="email" name="email" required class="w-full p-3 rounded-lg bg-slate-50 dark:bg-[#0a0a0a] border border-slate-200 dark:border-darkBorder text-slate-900 dark:text-white focus:border-slate-500 dark:focus:border-slate-400 outline-none transition-colors text-sm" placeholder="john@example.com">
                        </div>
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold text-slate-700 dark:text-slate-300">Subject</label>
                        <select name="subject" required class="w-full p-3 rounded-lg bg-slate-50 dark:bg-[#0a0a0a] border border-slate-200 dark:border-darkBorder text-slate-900 dark:text-white focus:border-slate-500 dark:focus:border-slate-400 outline-none transition-colors text-sm appearance-none cursor-pointer">
                            <option value="Bug Report">Report an Issue / Bug</option>
                            <option value="Feature Request">Request a New Feature</option>
                            <option value="General Feedback">General Feedback</option>
                        </select>
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold text-slate-700 dark:text-slate-300">Message</label>
                        <textarea name="message" required rows="5" class="w-full p-3 rounded-lg bg-slate-50 dark:bg-[#0a0a0a] border border-slate-200 dark:border-darkBorder text-slate-900 dark:text-white focus:border-slate-500 dark:focus:border-slate-400 outline-none transition-colors text-sm resize-none" placeholder="How can we help you?"></textarea>
                    </div>

                    <button type="submit" class="w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 hover:bg-slate-800 dark:hover:bg-slate-200 py-3 rounded-lg font-semibold text-sm transition-colors mt-2">
                        Send Message
                    </button>
                </form>
            </div>
            
        </div>
    </main>

    <footer class="bg-white dark:bg-darkBg border-t border-slate-200 dark:border-darkBorder py-8">
        <div class="container mx-auto px-4 text-center">
            <p class="text-xs text-slate-500">&copy; 2024-2026 MARK_Tools Ecosystem.</p>
        </div>
    </footer>

    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        }
    </script>
</body>
</html>
