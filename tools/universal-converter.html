                            <div class="relative">
                                <input type="number" id="val1" class="w-full p-4 rounded-lg font-mono text-2xl md:text-3xl bg-white dark:bg-[#111111] border border-slate-300 dark:border-slate-700 text-slate-900 dark:text-white placeholder-slate-400 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all shadow-sm" placeholder="0" oninput="convert()">

                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg> Copy

                icon: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>`,
                title: "Network Speed", desc: "Network data transfer rates (Bandwidth).",
                units: {
                    "Bits per sec (bps)": 1, "Kilobits per sec (Kbps)": 1000,
                    "Megabits per sec (Mbps)": 1e6, "Gigabits per sec (Gbps)": 1e9,
                    "Bytes per sec (B/s)": 8, "Megabytes per sec (MB/s)": 8e6,
                    "Gigabytes per sec (GB/s)": 8e9
                }
            },
            numeral: {
                icon: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>`,
                title: "Numeral Base", desc: "Developer radix systems (Hex, Binary).", special: "base",
                units: { "Decimal (Base-10)": 10, "Binary (Base-2)": 2, "Octal (Base-8)": 8, "Hexadecimal (Base-16)": 16 }
            },
            length: {
                icon: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>`,
                title: "Length & Dist", desc: "Length, distance, up to astronomy units.",
                units: {
                    "Millimeter (mm)": 0.001, "Centimeter (cm)": 0.01, "Meter (m)": 1, "Kilometer (km)": 1000,
                    "Inch (in)": 0.0254, "Foot (ft)": 0.3048, "Yard (yd)": 0.9144, "Mile (mi)": 1609.34,
                    "Nautical Mile": 1852, "Light Year (ly)": 9.4607e15, "Parsec (pc)": 3.08567758e16
                }
            },
            area: {
                icon: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"></path>`,
                title: "Area", desc: "Surface measurements and real estate sizes.",
                units: {
                    "Square Meter (m²)": 1, "Square Kilometer (km²)": 1e6, "Hectare (ha)": 10000, "Acre": 4046.86,
                    "Square Foot (sq ft)": 0.092903, "Square Mile (sq mi)": 2.59e6
                }
            },
            volume: {
                icon: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>`,
                title: "Volume", desc: "Liquid and space volume capacities.",
                units: {
                    "Liter (L)": 1, "Milliliter (ml)": 0.001, "Cubic Meter (m³)": 1000,
                    "Gallon (US)": 3.78541, "Quart (US)": 0.946353, "Pint (US)": 0.473176
                }
            },
            pressure: {
                icon: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path>`,

                    "Pascal (Pa)": 1, "Kilopascal (kPa)": 1000, "Bar": 100000,
                    "Atmosphere (atm)": 101325, "PSI": 6894.76, "Torr": 133.322
                }
            },
            weight: {
                icon: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path>`,

                    "Milligram (mg)": 0.001, "Gram (g)": 1, "Kilogram (kg)": 1000, "Metric Ton (t)": 1e6,

            },

                units: { "Celsius (°C)": "C", "Fahrenheit (°F)": "F", "Kelvin (K)": "K", "Reaumur (°R)": "R" }
            },
            time: {

                    "Week": 604800, "Month (30 d)": 2592000, "Year (365 d)": 31536000
                }
            }
        };

        let currentCategory = "data";

        function buildCategoryGrid() {
            const menu = document.getElementById('categoryMenu');
            Object.keys(unitDB).forEach(key => {
                const btn = document.createElement('button');
                btn.className = "cat-btn w-full flex items-center gap-3 p-3 rounded-xl text-xs font-bold uppercase tracking-wide transition-colors text-left border border-transparent";
                btn.innerHTML = `<svg class="w-4 h-4 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor">${unitDB[key].icon}</svg> <span>${unitDB[key].title}</span>`;
                btn.onclick = () => loadCategory(key);
                btn.id = "btnCat-" + key;
                menu.appendChild(btn);
            });
        }

        function loadCategory(key) {
            currentCategory = key;
            const data = unitDB[key];
            
            // UI Active State
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.remove('bg-slate-100', 'dark:bg-[#1e293b]', 'text-slate-900', 'dark:text-white');
                b.classList.add('text-slate-500', 'dark:text-slate-400', 'hover:bg-slate-50', 'dark:hover:bg-slate-800/50');
            });
            const activeBtn = document.getElementById('btnCat-' + key);
            activeBtn.classList.remove('text-slate-500', 'dark:text-slate-400', 'hover:bg-slate-50', 'dark:hover:bg-slate-800/50');
            activeBtn.classList.add('bg-slate-100', 'dark:bg-[#1e293b]', 'text-slate-900', 'dark:text-white');
            
            document.getElementById('activeCategoryTitle').innerText = data.title;
            document.getElementById('activeCategoryDesc').innerText = data.desc;

            const u1 = document.getElementById('unit1');
            const u2 = document.getElementById('unit2');
            const v1 = document.getElementById('val1');
            const v2 = document.getElementById('val2');

            u1.innerHTML = ""; u2.innerHTML = "";
            Object.keys(data.units).forEach(unitName => {
                u1.innerHTML += `<option value="${unitName}">${unitName}</option>`;
                u2.innerHTML += `<option value="${unitName}">${unitName}</option>`;
            });
            if(Object.keys(data.units).length > 1) u2.selectedIndex = 1;

            // Handle Input Mode (Text for Base, Number for rest)
            if (data.special === "base") {
                v1.type = "text"; v2.type = "text";
                v1.placeholder = "e.g., FF or 1010";
                v1.value = "10";
            } else {
                v1.type = "number"; v2.type = "text"; // output stays text to prevent arrows
                v1.placeholder = "0";
                v1.value = 1;
            }

            convert();
        }

        function swapUnits() {
            const u1 = document.getElementById('unit1');
            const u2 = document.getElementById('unit2');
            const temp = u1.value;
            u1.value = u2.value;
            u2.value = temp;
            convert();
        }

        function clearInput() {
            document.getElementById('val1').value = "";
            document.getElementById('val2').value = "";
            document.getElementById('formulaText').innerText = "Awaiting input...";
        }

        // strictly 1-way: Input(val1) -> Output(val2)
        function convert() {
            const data = unitDB[currentCategory];
            const name1 = document.getElementById('unit1').value;
            const name2 = document.getElementById('unit2').value;
            const inBox = document.getElementById('val1');
            const outBox = document.getElementById('val2');
            const formulaText = document.getElementById('formulaText');

            const inputStr = inBox.value.trim();
            if (!inputStr) { outBox.value = ""; return; }

            // --- RADIX / NUMERAL LOGIC ---
            if (data.special === "base") {
                const radix1 = data.units[name1];
                const radix2 = data.units[name2];
                const parsed = parseInt(inputStr, radix1);
                outBox.value = isNaN(parsed) ? "Invalid" : parsed.toString(radix2).toUpperCase();
                formulaText.innerText = `Base-${radix1} to Base-${radix2} manipulation.`;
                return;
            }

            // --- STANDARD LOGIC ---
            const val1 = parseFloat(inputStr);
            if(isNaN(val1)) { outBox.value = ""; return; }

            if (data.special === "temp") {
                const type1 = data.units[name1];
                const type2 = data.units[name2];
                let tempC = 0; 

                // Normalize to Celsius
                if(type1==='C') tempC = val1;
                else if(type1==='F') tempC = (val1 - 32) * 5/9;
                else if(type1==='K') tempC = val1 - 273.15;
                else if(type1==='R') tempC = val1 * 5/4;

                // Output format
                if(type2==='C') outBox.value = formatNumber(tempC);
                else if(type2==='F') outBox.value = formatNumber((tempC * 9/5) + 32);
                else if(type2==='K') outBox.value = formatNumber(tempC + 273.15);
                else if(type2==='R') outBox.value = formatNumber(tempC * 4/5);

                formulaText.innerText = `Standard thermodynamic formulas applied.`;
                return;
            }

            // Standard Multiplier
            const rate1 = data.units[name1];
            const rate2 = data.units[name2];
            outBox.value = formatNumber((val1 * rate1) / rate2);

            const ratio = rate1 / rate2;
            formulaText.innerText = `1 ${name1.split(' ')[0]} = ${formatNumber(ratio)} ${name2.split(' ')[0]}`;
        }

        function formatNumber(num) {
            if(num === 0) return 0;
            return parseFloat(num.toPrecision(10)); 
        }

        function copyResult() {
            const result = document.getElementById('val2').value;
            if(!result || result === "Invalid") return;
            navigator.clipboard.writeText(result);
            
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); }, 2000);
        }

        // --- EXPORT PDF & WORD ---
        async function exportReport(format) {
            const btnPdf = document.getElementById('btnExportPdf');
            const btnWord = document.getElementById('btnExportWord');
            btnPdf.disabled = true; btnWord.disabled = true;

            const catTitle = document.getElementById('activeCategoryTitle').innerText;
            const val1 = document.getElementById('val1').value;
            const u1 = document.getElementById('unit1').value;
            const val2 = document.getElementById('val2').value;
            const u2 = document.getElementById('unit2').value;
            const formula = document.getElementById('formulaText').innerText;

            const tableData = [
                ['Category', catTitle],
                ['Input Value', `${val1} ${u1}`],
                ['Converted Result', `${val2} ${u2}`],
                ['Engine Formula', formula]
            ];

            let finalBlob, finalFileName;

            try {
                if (format === 'pdf') {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF('p', 'mm', 'a4'); 
                    doc.setFont("courier", "bold").setFontSize(16);
                    doc.text("ENGINEERING CONVERSION AUDIT", 105, 20, { align: "center" });
                    doc.setFontSize(10).setFont("courier", "normal");
                    doc.text(`Timestamp : ${new Date().toLocaleString()}`, 14, 35);

                    doc.autoTable({
                        startY: 45, head: [['Parameter', 'Detail Log']],
                        body: tableData, theme: 'grid',
                        styles: { font: 'courier', fontSize: 9, cellPadding: 4 },
                        headStyles: { fillColor:[15, 23, 42] }
                    });

                    finalBlob = doc.output('blob');
                    finalFileName = `MARK_Audit_${catTitle.replace(/\s/g,'_')}.pdf`;

                } else if (format === 'word') {
                    if (typeof window.docx === 'undefined') throw new Error("Docx library not loaded.");

                    const tableRows =[
                        new window.docx.TableRow({ tableHeader: true, children:[
                            new window.docx.TableCell({ children:[new window.docx.Paragraph({text: "Parameter", bold: true, color: "ffffff"})], shading: { fill: "0f172a" } }),
                            new window.docx.TableCell({ children:[new window.docx.Paragraph({text: "Detail Log", bold: true, color: "ffffff"})], shading: { fill: "0f172a" } })
                        ]}),
                        ...tableData.map(row => new window.docx.TableRow({
                            children:[
                                new window.docx.TableCell({ children:[new window.docx.Paragraph({text: row[0], font: "Courier New"})] }),
                                new window.docx.TableCell({ children:[new window.docx.Paragraph({text: row[1], font: "Courier New"})] })
                            ]
                        }))
                    ];

                    const docWord = new window.docx.Document({
                        sections:[{
                            children:[
                                new window.docx.Paragraph({ children:[new window.docx.TextRun({ text: "ENGINEERING CONVERSION AUDIT", bold: true, size: 28, font: "Courier New" })], alignment: window.docx.AlignmentType.CENTER, spacing: { after: 400 } }),
                                new window.docx.Paragraph({ text: `Timestamp : ${new Date().toLocaleString()}`, font: "Courier New", spacing: { after: 400 } }),
                                new window.docx.Table({ width: { size: 100, type: window.docx.WidthType.PERCENTAGE }, rows: tableRows })
                            ]
                        }]
                    });

                    finalBlob = await window.docx.Packer.toBlob(docWord);
                    finalFileName = `MARK_Audit_${catTitle.replace(/\s/g,'_')}.docx`;
                }

                if (typeof processDirectDownload === 'function') {
                    await processDirectDownload('Universal Converter', finalFileName, finalBlob);
                } else {
                    const url = URL.createObjectURL(finalBlob);
                    const link = document.createElement('a');
                    link.href = url; link.download = finalFileName;
                    document.body.appendChild(link); link.click(); link.remove();
                    URL.revokeObjectURL(url);
                }

            } catch(e) {
                alert("Export failed: " + e.message);
            } finally {
                btnPdf.disabled = false; btnWord.disabled = false;
            }
        }
        
        window.onload = () => {
            buildCategoryGrid();
            loadCategory(currentCategory);
        };
    </script>
</body>
</html>
