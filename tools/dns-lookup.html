<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global DNS Propagation & Map Resolver</title>
    <meta name="description" content="Check DNS records globally and map server locations in real-time. Verify A, AAAA, MX, and TXT records with interactive geo-mapping.">
    <link rel="icon" type="image/png" href="../favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/main.js"></script>
    <script src="../js/history.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>

    <!-- LEAFLET.JS UNTUK PETA INTERAKTIF (GRATIS) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { darkBg: '#0f172a', darkCard: '#1e293b', darkBorder: '#334155' } } } }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); } else { document.documentElement.classList.remove('dark'); }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@600&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .spin-slow { animation: spin 2s linear infinite; }
        
        /* Kustomisasi Peta Leaflet agar membaur dengan Dark Mode */
        #mapContainer { height: 400px; width: 100%; border-radius: 1.5rem; z-index: 10; }
        .leaflet-container { background: #0f172a; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] dark:bg-darkBg text-slate-900 dark:text-slate-300 min-h-screen flex flex-col">

    <nav class="bg-white/80 dark:bg-darkBg/80 backdrop-blur-lg sticky top-0 z-50 border-b border-slate-200 dark:border-darkBorder shadow-sm">
        <div class="container mx-auto px-6 h-16 flex justify-between items-center max-w-7xl">
            <a href="../index.html" class="flex items-center gap-2 group">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-md">
                    <span class="text-white font-black text-sm">M</span>
                </div>
                <h1 class="text-xl font-black tracking-tighter text-slate-800 dark:text-white">MARK_Tools</h1>
            </a>
            <a class="text-xs font-bold text-slate-500 hover:text-blue-600" href="../index.html">← BACK</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-12 max-w-6xl flex-grow">
        
        <div class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-black text-slate-800 dark:text-white mb-3 tracking-tight">DNS Propagation & Geo-Map</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm max-w-2xl mx-auto">Resolve DNS records and track physical server locations on an interactive global map instantly.</p>
        </div>

        <!-- INPUT BOX -->
        <div class="bg-white dark:bg-darkCard p-4 md:p-6 rounded-3xl shadow-xl border border-slate-200 dark:border-darkBorder max-w-4xl mx-auto mb-10">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-grow">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 px-2">Target Domain</label>
                    <input type="text" id="domainInput" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 font-medium text-lg" placeholder="google.com" onkeydown="if(event.key === 'Enter') startDNSCheck()">
                </div>
                <div class="w-full md:w-48">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 px-2">Record Type</label>
                    <select id="recordType" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 font-bold cursor-pointer">
                        <option value="A">A (IPv4)</option>
                        <option value="AAAA">AAAA (IPv6)</option>
                        <option value="CNAME">CNAME</option>
                        <option value="MX">MX (Email)</option>
                        <option value="TXT">TXT</option>
                        <option value="NS">NS</option>
                    </select>
                </div>
                <div class="w-full md:w-auto flex items-end">
                    <button onclick="startDNSCheck()" id="btnSearch" class="w-full md:w-32 bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl font-black uppercase tracking-widest shadow-lg transition-all h-[60px]">
                        Scan
                    </button>
                </div>
            </div>
        </div>

        <!-- PETA LOKASI SERVER (LEAFLET MAP) -->
        <div id="mapWrapper" class="max-w-4xl mx-auto mb-10 hidden animate-fade-in relative p-2 bg-white dark:bg-darkCard rounded-[2rem] shadow-xl border border-slate-200 dark:border-darkBorder">
            <div class="absolute top-6 left-6 z-[400] bg-black/80 text-white px-4 py-2 rounded-full backdrop-blur-md text-[10px] font-black uppercase tracking-widest border border-white/10 shadow-lg flex items-center gap-2">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div> Live Geo-Routing
            </div>
            <div id="mapContainer"></div>
        </div>

        <!-- PROGRESS BAR -->
        <div id="progressContainer" class="max-w-4xl mx-auto mb-8 hidden">
            <div class="flex justify-between text-xs font-bold text-slate-500 mb-2 uppercase tracking-widest">
                <span>Querying Global Nodes...</span>
                <span id="progressText">0/0</span>
            </div>
            <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2 overflow-hidden">
                <div id="progressBar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <!-- EXPORT BUTTONS -->
        <div id="exportArea" class="max-w-4xl mx-auto mb-6 flex justify-end gap-3 hidden animate-fade-in">
            <button onclick="exportReport('pdf')" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-lg font-bold text-xs shadow-md flex items-center gap-2">📄 Export PDF</button>
            <button onclick="exportReport('word')" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-bold text-xs shadow-md flex items-center gap-2">📝 Export Word</button>
        </div>

        <!-- RESULTS TABLE -->
        <div id="resultsTable" class="max-w-4xl mx-auto bg-white dark:bg-darkCard rounded-2xl shadow-sm border border-slate-200 dark:border-darkBorder overflow-hidden hidden animate-fade-in">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-700 text-[10px] uppercase tracking-widest text-slate-500">
                            <th class="p-4 font-bold">DoH Node</th>
                            <th class="p-4 font-bold text-center">Status</th>
                            <th class="p-4 font-bold">Resolved Data</th>
                            <th class="p-4 font-bold">Geo-Location / ISP</th>
                        </tr>
                    </thead>
                    <tbody id="serverList" class="text-sm">
                        <!-- Server rows injected here -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        // DAFTAR GLOBAL DoH SERVERS
        const globalServers =[
            { id: "g1", flag: "🇺🇸", loc: "Google DNS (US)", url: "https://dns.google/resolve" },
            { id: "c1", flag: "🌐", loc: "Cloudflare (Global)", url: "https://cloudflare-dns.com/dns-query" },
            { id: "q1", flag: "🇨🇭", loc: "Quad9 (Europe)", url: "https://dns.quad9.net:5053/dns-query" },
            { id: "a1", flag: "🇨🇳", loc: "AliDNS (Asia)", url: "https://dns.alidns.com/resolve" },
        ];

        let completedQueries = 0;
        let exportData =[];
        let currentDomain = "";
        let currentType = "";
        
        // PETA LEAFLET
        let leafletMap = null;
        let mapMarkers =[];

        window.onload = () => {
            const savedState = sessionStorage.getItem('dnsState');
            if (savedState) {
                const state = JSON.parse(savedState);
                document.getElementById('domainInput').value = state.domain;
                document.getElementById('recordType').value = state.type;
            }
        };

        function initMap() {
            document.getElementById('mapWrapper').classList.remove('hidden');
            
            if (leafletMap !== null) {
                // Bersihkan marker lama
                mapMarkers.forEach(m => leafletMap.removeLayer(m));
                mapMarkers =[];
                return;
            }

            // Inisialisasi Peta Pertama Kali
            leafletMap = L.map('mapContainer').setView([20, 0], 2);
            
            // Gunakan tema CartoDB Dark Matter agar mewah
            const isDark = document.documentElement.classList.contains('dark');
            const tileUrl = isDark ? 
                'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' : 
                'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';

            L.tileLayer(tileUrl, {
                attribution: '&copy; OpenStreetMap &copy; CartoDB',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(leafletMap);
        }

        async function startDNSCheck() {
            let domain = document.getElementById('domainInput').value.trim();
            domain = domain.replace(/^(?:https?:\/\/)?(?:www\.)?/i, "").split('/')[0];
            document.getElementById('domainInput').value = domain;
            const type = document.getElementById('recordType').value;

            if (!domain) return alert("Please enter a valid domain.");

            sessionStorage.setItem('dnsState', JSON.stringify({ domain, type }));
            currentDomain = domain; currentType = type;
            completedQueries = 0; exportData =[];
            
            document.getElementById('btnSearch').disabled = true;
            document.getElementById('progressContainer').classList.remove('hidden');
            document.getElementById('exportArea').classList.add('hidden');
            document.getElementById('resultsTable').classList.remove('hidden');
            
            initMap(); // Buka Peta

            const tbody = document.getElementById('serverList');
            tbody.innerHTML = "";

            globalServers.forEach(server => {
                tbody.innerHTML += `
                    <tr id="row-${server.id}" class="border-b border-slate-100 dark:border-slate-800">
                        <td class="p-4 font-medium"><span class="text-xl mr-2">${server.flag}</span>${server.loc}</td>
                        <td class="p-4 text-center" id="stat-${server.id}">
                            <div class="w-4 h-4 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                        </td>
                        <td class="p-4 font-mono text-xs text-blue-500" id="res-${server.id}">Querying...</td>
                        <td class="p-4 text-xs text-slate-400" id="geo-${server.id}">Awaiting IP...</td>
                    </tr>
                `;
            });

            updateProgress();
            globalServers.forEach(server => fetchDNS(server, domain, type));
        }

        async function fetchDNS(server, domain, type) {
            const url = `${server.url}?name=${domain}&type=${type}`;
            try {
                const response = await fetch(url, { headers: { 'Accept': 'application/dns-json' } });
                const data = await response.json();
                
                if (data.Status === 0 && data.Answer) {
                    const answers = data.Answer.map(a => a.data).join('<br>');
                    const cleanAnswers = data.Answer.map(a => a.data).join(', ');
                    
                    document.getElementById(`res-${server.id}`).innerHTML = `<span class="text-slate-800 dark:text-slate-200">${answers}</span>`;
                    document.getElementById(`stat-${server.id}`).innerHTML = `✅`;
                    
                    // JIKA RECORD ADALAH IP (A atau AAAA), Lacak Lokasinya!
                    const firstIP = data.Answer[0].data;
                    const ipRegex = /^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$|^(?:[A-F0-9]{1,4}:){7}[A-F0-9]{1,4}$/i;
                    
                    if (ipRegex.test(firstIP)) {
                        await trackIPLocation(firstIP, server.id, cleanAnswers);
                    } else {
                        document.getElementById(`geo-${server.id}`).innerText = "N/A (Not an IP Record)";
                        exportData.push([server.loc, 'OK', cleanAnswers, "N/A"]);
                    }
                } else {
                    document.getElementById(`res-${server.id}`).innerHTML = `<span class="text-slate-400">Record not found</span>`;
                    document.getElementById(`stat-${server.id}`).innerHTML = `❌`;
                    document.getElementById(`geo-${server.id}`).innerText = "---";
                    exportData.push([server.loc, 'Not Found', '-', '-']);
                }
            } catch (error) {
                document.getElementById(`res-${server.id}`).innerHTML = `<span class="text-red-400">Connection Failed</span>`;
                document.getElementById(`stat-${server.id}`).innerHTML = `⚠️`;
                document.getElementById(`geo-${server.id}`).innerText = "---";
                exportData.push([server.loc, 'Error', 'Failed', '-']);
            }
            completedQueries++;
            updateProgress();
        }

        // FUNGSI MELACAK IP LALU MENARUHNYA DI PETA
        async function trackIPLocation(ip, serverId, cleanAnswers) {
            try {
                const res = await fetch(`https://ipwho.is/${ip}`);
                const geo = await res.json();

                if (geo.success) {
                    const locText = `${geo.city}, ${geo.country} (${geo.connection.isp})`;
                    document.getElementById(`geo-${server.id}`).innerHTML = `<span class="text-emerald-600 dark:text-emerald-400 font-bold">${locText}</span>`;
                    
                    // Tambah Pin ke Peta
                    const marker = L.marker([geo.latitude, geo.longitude]).addTo(leafletMap)
                        .bindPopup(`<b>${currentDomain}</b><br>Resolved IP: ${ip}<br>Location: ${geo.city}, ${geo.country}<br>ISP: ${geo.connection.isp}`);
                    
                    mapMarkers.push(marker);
                    
                    // Pusatkan Peta agar mencakup semua marker
                    const group = new L.featureGroup(mapMarkers);
                    leafletMap.fitBounds(group.getBounds(), { padding: [50, 50], maxZoom: 12 });

                    exportData.push([document.getElementById(`row-${serverId}`).cells[0].innerText, 'OK', cleanAnswers, locText]);
                } else {
                    document.getElementById(`geo-${server.id}`).innerText = "Geo-Data Hidden";
                    exportData.push([document.getElementById(`row-${serverId}`).cells[0].innerText, 'OK', cleanAnswers, "Hidden"]);
                }
            } catch (e) {
                document.getElementById(`geo-${server.id}`).innerText = "Geo-Data Failed";
            }
        }

        function updateProgress() {
            const total = globalServers.length;
            const percent = (completedQueries / total) * 100;
            document.getElementById('progressBar').style.width = percent + "%";
            document.getElementById('progressText').innerText = `${completedQueries}/${total}`;
            if (completedQueries === total) {
                document.getElementById('btnSearch').disabled = false;
                setTimeout(() => {
                    document.getElementById('progressContainer').classList.add('hidden');
                    document.getElementById('exportArea').classList.remove('hidden');
                }, 500);
            }
        }

        // --- EXPORT FUNCTION ---
        async function exportReport(format) {
            if (exportData.length === 0) return;
            try {
                let finalBlob, finalFileName;
                if (format === 'pdf') {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF('l', 'mm', 'a4'); 
                    doc.setFont("helvetica", "bold").setFontSize(18);
                    doc.text("GLOBAL DNS & ROUTING REPORT", 14, 20);
                    doc.setFontSize(10).setFont("helvetica", "normal");
                    doc.text(`Domain: ${currentDomain} | Record: ${currentType}`, 14, 28);

                    doc.autoTable({
                        startY: 35, head: [['Query Node', 'Status', 'Resolved Data', 'Target Geo-Location']],
                        body: exportData, theme: 'grid', styles: { fontSize: 9 }
                    });
                    finalBlob = doc.output('blob');
                    finalFileName = `DNS_Map_${currentDomain}.pdf`;
                } else if (format === 'word') {
                    // Logic Word Docx (Simplified for space)
                    const tableRows = [
                        new window.docx.TableRow({ tableHeader: true, children:['Query Node', 'Status', 'Resolved Data', 'Location'].map(text => new window.docx.TableCell({ children:[new window.docx.Paragraph({text: text, bold: true})] })) }),
                        ...exportData.map(row => new window.docx.TableRow({ children: row.map(text => new window.docx.TableCell({ children:[new window.docx.Paragraph(text.toString())] })) }))
                    ];
                    const docWord = new window.docx.Document({
                        sections:[{ properties: { page: { size: { orientation: window.docx.PageOrientation.LANDSCAPE } } }, children:[
                            new window.docx.Paragraph({ children:[new window.docx.TextRun({ text: "GLOBAL DNS REPORT", bold: true, size: 28 })] }),
                            new window.docx.Table({ width: { size: 100, type: window.docx.WidthType.PERCENTAGE }, rows: tableRows })
                        ]}]
                    });
                    finalBlob = await window.docx.Packer.toBlob(docWord);
                    finalFileName = `DNS_Map_${currentDomain}.docx`;
                }

                if(typeof processRedirect === 'function') await processRedirect('DNS Map', finalFileName, finalBlob);

            } catch(e) { alert("Export failed."); }
        }
    </script>
</body>
</html>
